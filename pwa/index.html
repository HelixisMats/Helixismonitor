<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Helixis">
  <title>Helixis LC Monitor</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #FFFFFF;
      --bg2:     #F5F6FA;
      --border:  #DDE1EE;
      --text:    #1C2033;
      --muted:   #8A90A8;
      --blue:    #1F4FE0;
      --teal:    #167A5E;
      --amber:   #B87200;
      --rust:    #A83030;
      --slate:   #2E5EA0;
      --lgray:   #E4E7F0;
      --green:   #167A5E;
      --red:     #A83030;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    #root { max-width: 1200px; margin: 0 auto; padding: 0 12px 40px; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .header-logo img { height: 32px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }
    .ts { font-size: 13px; color: var(--muted); }

    /* Section */
    .section-label {
      font-size: 10px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em;
      border-left: 2px solid var(--blue); padding-left: 8px;
      margin: 18px 0 10px;
    }

    /* Grid */
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (max-width: 700px) {
      .grid-5 { grid-template-columns: repeat(3, 1fr); }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .grid-5 { grid-template-columns: repeat(2, 1fr); }
    }

    /* Thermometer card */
    .thermo-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 8px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .thermo-label { font-size: 11px; font-weight: 600; color: var(--text); }
    .thermo-svg { width: 48px; }
    .thermo-value { font-size: 15px; font-weight: 700; }
    .thermo-unit  { font-size: 10px; color: var(--muted); margin-top: -2px; }

    /* Gauge card */
    .gauge-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 10px 10px;
      display: flex; flex-direction: column; align-items: center;
    }
    .gauge-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .gauge-sub   { font-size: 9px; color: var(--muted); margin-bottom: 6px; text-align:center; }
    .gauge-value { font-size: 22px; font-weight: 700; margin-top: -4px; }
    .gauge-unit  { font-size: 11px; color: var(--muted); }

    /* KPI card */
    .kpi-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .kpi-label { font-size: 10px; font-weight: 600; color: var(--muted);
                 text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
    .kpi-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .kpi-unit  { font-size: 12px; color: var(--muted); margin-left: 2px; }

    /* Alert banner */
    .alert-banner {
      background: #FEF0F0; border: 1px solid #F5C0C0; border-radius: 8px;
      padding: 8px 14px; font-size: 13px; color: #8B1A1A; font-weight: 500;
      margin-top: 8px;
    }

    /* Tabs */
    .tab-bar {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin: 18px 0 12px; overflow-x: auto;
    }
    .tab-btn {
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      color: var(--muted); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* Chart */
    .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 4px 4px; }

    /* Refresh btn */
    .refresh-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; font-size: 12px; color: var(--muted); cursor: pointer;
    }
    .refresh-btn:hover { background: var(--bg2); }

    /* Warning chip */
    .warn-chip {
      background: #FFF0D0; border: 1px solid #FFD070; border-radius: 20px;
      padding: 2px 10px; font-size: 11px; color: #8A5000; font-weight: 600;
    }
  </style>
</head>

// ── Helpers ──────────────────────────────────────────────────
const fmt = (v, d=1, u='') => v == null ? '—' : `${v.toFixed(d)}${u ? ' '+u : ''}`;

function sweTime(ts) {
  return new Date(ts).toLocaleTimeString('sv-SE', { timeZone: 'Europe/Stockholm', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function todayStart() {
  const now = new Date();
  const swe = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Stockholm' }));
  swe.setHours(0,0,0,0);
  const diff = now - swe;
  return new Date(now - diff - (swe - new Date(swe.toLocaleString('en-US')))).toISOString();
}

// ── SVG Thermometer ──────────────────────────────────────────
function Thermometer({ val, min, max, color }) {
  const pct = val == null ? 0 : Math.max(0, Math.min(1, (val - min) / (max - min)));
  const H = 100, W = 36, cx = 18, tubeW = 10;
  const bulbR = 9, bulbCy = H - bulbR - 2;
  const tubeTop = 8, tubeBot = bulbCy - bulbR + 4;
  const tubeH = tubeBot - tubeTop;
  const fillH = pct * tubeH;
  const fillTop = tubeBot - fillH;

  return h('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}`, className: 'thermo-svg' },
    h('rect', { x: cx-tubeW/2, y: tubeTop, width: tubeW, height: tubeH, rx:5, fill:'#E4E7F0', stroke:'#DDE1EE', strokeWidth:1 }),
    fillH > 0 && h('rect', { x: cx-tubeW/2+1, y: fillTop, width: tubeW-2, height: fillH, rx:4, fill: color }),
    h('circle', { cx, cy: bulbCy, r: bulbR, fill:'#E4E7F0', stroke:'#DDE1EE', strokeWidth:1 }),
    h('circle', { cx, cy: bulbCy, r: bulbR-2, fill: color }),
    h('rect',   { x: cx-tubeW/2+1, y: tubeBot-3, width: tubeW-2, height:6, fill: color }),
  );
}

// ── Semicircle Gauge ─────────────────────────────────────────
function SemiGauge({ val, min, max, color, warn }) {
  const pct = val == null ? 0 : Math.max(0, Math.min(1, (val - min) / (max - min)));
  const W = 160, H = 90, cx = 80, cy = 85, r = 60, sw = 12;
  const toRad = a => (a - 90) * Math.PI / 180;
  const arc = (startDeg, endDeg, radius) => {
    const s = toRad(startDeg), e = toRad(endDeg);
    const x1 = cx + radius*Math.cos(s), y1 = cy + radius*Math.sin(s);
    const x2 = cx + radius*Math.cos(e), y2 = cy + radius*Math.sin(e);
    const large = (endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2}`;
  };
  const startA = -150, endA = -30;
  const range = endA - startA;
  const valA = startA + pct * range;

  const warnPct = warn != null ? Math.max(0, Math.min(1, (warn - min)/(max-min))) : null;
  const warnA   = warnPct != null ? startA + warnPct * range : null;

  const isOver = warn != null && val != null && val >= warn;

  return h('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}` },
    h('path', { d: arc(startA, endA, r), fill:'none', stroke:'#E4E7F0', strokeWidth: sw, strokeLinecap:'round' }),
    warnA && h('path', { d: arc(warnA, endA, r), fill:'none', stroke:'#FFE0A0', strokeWidth: sw, strokeLinecap:'round' }),
    pct > 0 && h('path', { d: arc(startA, valA, r), fill:'none', stroke: isOver ? '#A83030' : color, strokeWidth: sw, strokeLinecap:'round' }),
    h('text', { x: cx, y: cy-4, textAnchor:'middle', fontSize:11, fill:'#8A90A8' }, `${min}`),
    h('text', { x: cx+r+4, y: cy+4, textAnchor:'start', fontSize:11, fill:'#8A90A8' }, `${max}`),
  );
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [data, setData]     = useState({});
  const [chart, setChart]   = useState([]);
  const [lastTs, setLastTs] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab]       = useState(0);
  const [error, setError]   = useState(null);
  const dbRef = useRef(null);

  useEffect(() => {
    if (!SUPABASE_URL || !SUPABASE_KEY) {
      setError('Supabase credentials not configured. See README.');
      setLoading(false);
      return;
    }
    dbRef.current = createClient(SUPABASE_URL, SUPABASE_KEY);
    loadData();
    const interval = setInterval(loadData, 60000);
    return () => clearInterval(interval);
  }, []);

  const loadData = useCallback(async () => {
    if (!dbRef.current) return;
    try {
      const todayISO = todayStart();
      const { data: rows } = await dbRef.current
        .from('sensor_readings')
        .select('created_at,sensor,value')
        .gte('created_at', todayISO)
        .order('created_at');

      if (!rows || rows.length === 0) return;

      // Latest per sensor
      const latest = {};
      rows.forEach(r => { latest[r.sensor] = r.value; });
      setData(latest);

      // Timestamp
      const ts = rows[rows.length - 1].created_at;
      setLastTs(ts);

      // Build chart series (1 point per minute approx)
      const sensors = ['temp_right_coll','temp_left_coll','temp_forward','temp_return','temp_tank','power','flow','irradiance'];
      const byTime = {};
      rows.forEach(r => {
        if (!sensors.includes(r.sensor)) return;
        const t = r.created_at.slice(0,16);
        if (!byTime[t]) byTime[t] = { time: t };
        byTime[t][r.sensor] = r.value;
      });
      const chartData = Object.values(byTime).sort((a,b) => a.time.localeCompare(b.time));
      // Format time as HH:MM Swedish
      chartData.forEach(pt => {
        pt.label = new Date(pt.time).toLocaleTimeString('sv-SE',
          { timeZone:'Europe/Stockholm', hour:'2-digit', minute:'2-digit' });
      });
      setChart(chartData);
      setLoading(false);
    } catch(e) {
      setError(e.message);
      setLoading(false);
    }
  }, []);

  const ageSec = lastTs ? (Date.now() - new Date(lastTs)) / 1000 : 9999;
  const isLive = ageSec < 900; // 15 min
  const dotColor = isLive ? 'var(--teal)' : 'var(--rust)';

  const pres = data['pressure'];
  const hasAlert = pres != null && pres >= 5;

  const THERMO_CFG = [
    { label:'Collector R', key:'temp_right_coll', color:'#A83030', min:20, max:160 },
    { label:'Collector L', key:'temp_left_coll',  color:'#B87200', min:20, max:160 },
    { label:'Forward',     key:'temp_forward',    color:'#A83030', min:20, max:120 },
    { label:'Return',      key:'temp_return',     color:'#2E5EA0', min:10, max:100 },
    { label:'Tank',        key:'temp_tank',       color:'#167A5E', min:10, max:100 },
  ];

  const GAUGE_CFG = [
    { label:'Flow rate',      sub:'Fluid circulation',         key:'flow',       unit:'m³/h', min:0, max:1,    color:'#2E5EA0', dec:3 },
    { label:'Thermal power',  sub:'Rated 9.2 kW @ 1000 W/m²', key:'power',      unit:'kW',   min:0, max:9.2,  color:'#A83030', dec:2 },
    { label:'Solar irradiance',sub:'TOA max ~1350 W/m²',       key:'irradiance', unit:'W/m²', min:0, max:1350, color:'#B87200', dec:0 },
    { label:'System pressure', sub:'Max 6 bar — warn at 5',    key:'pressure',   unit:'bar',  min:0, max:6,    color:'#2E5EA0', dec:2, warn:5 },
  ];

  const TABS = ['🌡️ Temperatures','⚡ Power & Flow','☀️ Solar vs Power','🔁 ΔT'];

  const CHART_LINES = [
    [
      { key:'temp_right_coll', color:'#A83030', name:'Collector R' },
      { key:'temp_left_coll',  color:'#B87200', name:'Collector L' },
      { key:'temp_forward',    color:'#C06020', name:'Forward' },
      { key:'temp_return',     color:'#2E5EA0', name:'Return' },
      { key:'temp_tank',       color:'#167A5E', name:'Tank' },
    ],
    [
      { key:'power', color:'#A83030', name:'Power (kW)' },
      { key:'flow',  color:'#2E5EA0', name:'Flow (m³/h)' },
    ],
    [
      { key:'irradiance', color:'#B87200', name:'Irradiance (W/m²)' },
      { key:'power',      color:'#A83030', name:'Power (kW)' },
    ],
    [
      { key:'temp_difference', color:'#1C2033', name:'ΔT (°C)' },
      { key:'temp_forward',    color:'#A83030', name:'Forward' },
      { key:'temp_return',     color:'#2E5EA0', name:'Return' },
    ],
  ];

  // Today's energy
  const heatRows = chart.filter(pt => pt['heat_energy'] != null);
  const energyToday = heatRows.length >= 2
    ? heatRows[heatRows.length-1]['heat_energy'] - heatRows[0]['heat_energy']
    : null;

  if (loading) return h('div', { style:{padding:'40px',textAlign:'center',color:'var(--muted)'} }, 'Loading…');
  if (error)   return h('div', { style:{padding:'40px',color:'var(--rust)'} }, `Error: ${error}`);

  return h('div', null,
    // Header
    h('div', { className:'header' },
      h('div', { className:'header-logo' }, h('img', { src: LOGO, alt:'Helixis' })),
      h('div', { className:'header-right' },
        h('span', { className:'status-dot', style:{ background: dotColor } }),
        h('span', { className:'ts' }, lastTs ? sweTime(lastTs) : '—'),
        h('button', { className:'refresh-btn', onClick: loadData }, '↺'),
      )
    ),

    // Alert
    hasAlert && h('div', { className:'alert-banner' },
      `⚠ High pressure: ${fmt(pres,2)} bar — approaching max 6 bar`
    ),

    // Thermometers
    h('div', { className:'section-label' }, 'Receiver Tube & Circuit Temperatures'),
    h('div', { className:'grid-5' },
      THERMO_CFG.map(cfg => h('div', { key:cfg.key, className:'thermo-card' },
        h('div', { className:'thermo-label' }, cfg.label),
        h(Thermometer, { val: data[cfg.key], min:cfg.min, max:cfg.max, color:cfg.color }),
        h('div', { className:'thermo-value', style:{ color:cfg.color } },
          data[cfg.key] != null ? data[cfg.key].toFixed(1) : '—'),
        h('div', { className:'thermo-unit' }, '°C'),
      ))
    ),

    // Gauges
    h('div', { className:'section-label' }, 'Flow, Power & Solar Irradiance'),
    h('div', { className:'grid-4' },
      GAUGE_CFG.map(cfg => {
        const v = data[cfg.key];
        const isOver = cfg.warn != null && v != null && v >= cfg.warn;
        const color = isOver ? '#A83030' : cfg.color;
        return h('div', { key:cfg.key, className:'gauge-card' },
          h('div', { className:'gauge-label' }, cfg.label),
          h('div', { className:'gauge-sub' }, cfg.sub),
          h(SemiGauge, { val:v, min:cfg.min, max:cfg.max, color, warn:cfg.warn }),
          h('div', { className:'gauge-value', style:{ color } },
            v != null ? v.toFixed(cfg.dec) : '—'),
          h('div', { className:'gauge-unit' }, cfg.unit),
          isOver && h('div', { className:'warn-chip', style:{marginTop:4} }, '⚠ Warning'),
        );
      })
    ),

    // Energy KPIs
    h('div', { className:'section-label' }, 'Energy'),
    h('div', { className:'grid-3' },
      h('div', { className:'kpi-card' },
        h('div', { className:'kpi-label' }, 'Energy today'),
        h('div', null,
          h('span', { className:'kpi-value' }, energyToday != null ? energyToday.toFixed(3) : '—'),
          h('span', { className:'kpi-unit' }, 'kWh'),
        )
      ),
      h('div', { className:'kpi-card' },
        h('div', { className:'kpi-label' }, 'Heat energy total'),
        h('div', null,
          h('span', { className:'kpi-value' }, data['heat_energy'] != null ? data['heat_energy'].toFixed(3) : '—'),
          h('span', { className:'kpi-unit' }, 'kWh'),
        )
      ),
      h('div', { className:'kpi-card' },
        h('div', { className:'kpi-label' }, 'ΔT Forward − Return'),
        h('div', null,
          h('span', { className:'kpi-value' }, data['temp_difference'] != null ? data['temp_difference'].toFixed(2) : '—'),
          h('span', { className:'kpi-unit' }, '°C'),
        )
      ),
    ),

    // Charts
    h('div', { className:'section-label' }, "Today's Trends"),
    h('div', { className:'tab-bar' },
      TABS.map((t,i) => h('button', {
        key:i, className:'tab-btn'+(tab===i?' active':''),
        onClick: ()=>setTab(i)
      }, t))
    ),
    h('div', { className:'chart-wrap' },
      h(ResponsiveContainer, { width:'100%', height:260 },
        h(LineChart, { data: chart, margin:{ top:8, right:16, left:-8, bottom:0 } },
          h(XAxis, { dataKey:'label', tick:{ fontSize:10, fill:'#8A90A8' }, tickLine:false, interval:'preserveStartEnd' }),
          h(YAxis, { tick:{ fontSize:10, fill:'#8A90A8' }, tickLine:false, axisLine:false, width:36 }),
          h(Tooltip, { contentStyle:{ fontSize:12, borderRadius:8, border:'1px solid #DDE1EE' } }),
          h(Legend, { iconSize:8, wrapperStyle:{ fontSize:11 } }),
          ...CHART_LINES[tab].map(l =>
            h(Line, { key:l.key, type:'monotone', dataKey:l.key, name:l.name,
                      stroke:l.color, strokeWidth:2, dot:false, connectNulls:true })
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
